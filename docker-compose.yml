services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: homeapp
      POSTGRES_USER: user_manager_svc
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_manager_svc -d homeapp"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
